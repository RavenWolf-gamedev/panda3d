name: Continuous Integration
on: [push, pull_request]

jobs:
  makepanda:
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')"
    strategy:
      matrix:
        os: [ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install build-essential bison flex libfreetype6-dev libgl1-mesa-dev libegl1-mesa-dev libgl1-mesa-dri mesa-utils-extra libgbm1 libjpeg-dev libode-dev libopenal-dev libpng-dev libssl-dev libvorbis-dev libx11-dev libxcursor-dev libxrandr-dev nvidia-cg-toolkit zlib1g-dev
    - name: Get thirdparty packages (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        $wc = New-Object System.Net.WebClient
        $wc.DownloadFile("https://www.panda3d.org/download/panda3d-1.10.16/panda3d-1.10.16-tools-win64.zip", "thirdparty-tools.zip")
        Expand-Archive -Path thirdparty-tools.zip
        Move-Item -Path thirdparty-tools/panda3d-1.10.16/thirdparty -Destination .
    - name: Get thirdparty packages (macOS)
      if: runner.os == 'macOS'
      run: |
        curl -O https://www.panda3d.org/download/panda3d-1.10.16/panda3d-1.10.16-tools-mac.tar.gz
        tar -xf panda3d-1.10.16-tools-mac.tar.gz
        mv panda3d-1.10.16/thirdparty thirdparty
        rmdir panda3d-1.10.16
        (cd thirdparty/darwin-libs-a && rm -rf rocket)

    - name: Set up XCode (macOS)
      if: runner.os == 'macOS'
      run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

    - name: Set up headless OpenGL
      run: |
        echo "LIBGL_ALWAYS_SOFTWARE=1" >> $GITHUB_ENV
        echo "GALLIUM_DRIVER=llvmpipe" >> $GITHUB_ENV
        echo "EGL_PLATFORM=surfaceless" >> $GITHUB_ENV

    - name: Test surfaceless EGL
      run: |
        cat > /tmp/test_egl.c << 'EOF'
        #include <EGL/egl.h>
        #include <EGL/eglext.h>
        #include <stdio.h>
        #define EGL_PLATFORM_SURFACELESS_MESA 0x31DD
        int main() {
            EGLDisplay dpy = eglGetPlatformDisplay(EGL_PLATFORM_SURFACELESS_MESA, EGL_DEFAULT_DISPLAY, NULL);
            if (dpy == EGL_NO_DISPLAY) { printf("No display\n"); return 1; }
            EGLint major, minor;
            if (!eglInitialize(dpy, &major, &minor)) { printf("Init failed: 0x%x\n", eglGetError()); return 1; }
            printf("EGL %d.%d\n", major, minor);
            printf("Vendor: %s\n", eglQueryString(dpy, EGL_VENDOR));
            eglTerminate(dpy);
            return 0;
        }
        EOF
        gcc /tmp/test_egl.c -o /tmp/test_egl -lEGL
        LIBGL_ALWAYS_SOFTWARE=1 /tmp/test_egl

    - name: Test Mesa setup
      shell: bash
      run: |
        # Check if llvmpipe driver exists
        ls -la /usr/lib/x86_64-linux-gnu/dri/ | grep -E "(llvmpipe|swrast|kms_swrast)"

        echo "=== DRI drivers ==="
        ls -la /usr/lib/x86_64-linux-gnu/dri/ 2>/dev/null || echo "No DRI dir"

        echo "=== EGL vendors ==="
        ls -la /usr/share/glvnd/egl_vendor.d/ 2>/dev/null || echo "No EGL vendors"

        # Try with debug output
        EGL_LOG_LEVEL=debug eglinfo -p surfaceless

        eglinfo -p surfaceless || true
        glxinfo
